name: MLOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Lint (syntax)
        run: ruff check . --select F --fix

      - name: Validate dataset schema
        run: python -m ml_pipeline.data_validation --data-version v1

      - name: Training pipeline check
        run: python -m ml_pipeline.train_pipeline --data-version v1 --model-version ci

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t student-career-backend:ci .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t student-career-frontend:ci .

      - name: Push images (placeholder)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Configure registry credentials and push commands here."

      - name: Deploy backend (placeholder)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Add deployment commands here (e.g., ECS, Kubernetes, or cloud run)."
